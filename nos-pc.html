<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geek'Nexus - Nos produits</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#050505;color:#fff}
a{text-decoration:none}
.hero{padding:40px 20px 18px;text-align:center}
.hero h1{margin:0;color:#ff7a00;font-size:clamp(30px,5vw,48px);font-weight:800}
.hero p{margin:12px 0 0;color:#d0d0d0;font-size:18px}
.wrap{max-width:1320px;margin:0 auto;padding:20px 18px 70px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:28px}
.card{display:block;background:#0d0d0d;border:1px solid #1d1d1d;border-radius:20px;overflow:hidden;box-shadow:0 18px 45px rgba(0,0,0,.45);transition:.25s;color:#fff}
.card:hover{transform:translateY(-6px);border-color:#ff7a00;box-shadow:0 24px 55px rgba(0,0,0,.6)}
.card img,.section img{display:block;width:100%;height:auto}
.content{padding:22px}
.content h2,.section h2{margin:0 0 10px;color:#ff7a00;font-size:30px}
.content p,.section p{margin:0;color:#ddd;line-height:1.6}
.footer{text-align:center;padding:10px 20px 42px;color:#9a9a9a}
.section{display:none;max-width:1100px;margin:0 auto;padding:30px 18px 60px}
.panel{background:#0d0d0d;border:1px solid #1d1d1d;border-radius:22px;overflow:hidden;box-shadow:0 18px 45px rgba(0,0,0,.45)}
.section-body{padding:24px}
.btns{display:flex;gap:14px;flex-wrap:wrap;margin:20px 0 0}
.btn{display:inline-block;padding:13px 18px;border-radius:999px;font-weight:700}
.orange{background:#ff7a00;color:#fff}
.outline{border:1px solid #ff7a00;color:#fff}
.grid-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:26px}
.box{background:#111;padding:18px;border-radius:16px;border:1px solid #1f1f1f}
.box h3{margin:0 0 8px;color:#ff7a00;font-size:20px}
.box p{margin:0;color:#d0d0d0;font-size:15px;line-height:1.5}
.back{display:inline-block;margin-bottom:20px;background:#ff7a00;color:#fff;padding:12px 18px;border-radius:999px;font-weight:700;cursor:pointer}
</style>
</head>
